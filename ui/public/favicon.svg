<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#ff9500"/>
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#010508"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>

  <!-- Orbit rings -->
  <circle cx="16" cy="16" r="6"  fill="none" stroke="rgba(160,190,255,0.35)" stroke-width="0.55"/>
  <circle cx="16" cy="16" r="10" fill="none" stroke="rgba(160,190,255,0.25)" stroke-width="0.45"/>
  <circle cx="16" cy="16" r="13.5" fill="none" stroke="rgba(160,190,255,0.18)" stroke-width="0.4"/>

  <!-- Sun -->
  <circle cx="16" cy="16" r="2.8" fill="url(#sun)" filter="url(#glow)"/>

  <!-- Planets -->
  <circle cx="22" cy="16" r="1.1" fill="#4a8fe8"/>
  <circle cx="6"  cy="16" r="1.4" fill="#e07040"/>
  <circle cx="16" cy="5.5" r="0.9" fill="#a0b8d8"/>
</svg>
